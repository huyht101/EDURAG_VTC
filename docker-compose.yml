name: ${COMPOSE_PROJECT_NAME:-edurag_vtc}

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      # DEMO ONLY. Use dedicated credentials and secret management in production.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-edurag}
      TZ: UTC
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./src/database/demo_seed.sql:/docker-entrypoint-initdb.d/02_demo_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - edurag_network

  app:
    build: .
    restart: unless-stopped
    environment:
      # This compose file is intentionally a local/demo profile.
      NODE_ENV: development
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-edurag}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_CONNECTION_LIMIT: ${DB_CONNECTION_LIMIT:-10}
      DB_QUEUE_LIMIT: ${DB_QUEUE_LIMIT:-50}
      DB_CONNECT_TIMEOUT_MS: ${DB_CONNECT_TIMEOUT_MS:-10000}
      DB_QUERY_TIMEOUT_MS: ${DB_QUERY_TIMEOUT_MS:-30000}
      JWT_SECRET: ${JWT_SECRET:-demo-only-jwt-secret-change-before-production-2026}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_ISSUER: ${JWT_ISSUER:-edurag-core}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-edurag-clients}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      TOKEN_HMAC_PEPPER: ${TOKEN_HMAC_PEPPER:-demo-only-token-hmac-pepper-change-production}
      AUTH_DEV_DELIVERY_LOG_SECRETS: ${AUTH_DEV_DELIVERY_LOG_SECRETS:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-0}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-30}
      AUTH_SENSITIVE_RATE_LIMIT_WINDOW_MS: ${AUTH_SENSITIVE_RATE_LIMIT_WINDOW_MS:-900000}
      AUTH_SENSITIVE_RATE_LIMIT_MAX: ${AUTH_SENSITIVE_RATE_LIMIT_MAX:-10}
      UPLOAD_DIR: /usr/src/app/uploads
      FILE_MAX_SIZE_BYTES: ${FILE_MAX_SIZE_BYTES:-20971520}
      # The base stack is always mock. docker-compose.remote.yml explicitly
      # opts the same app service into remote mode.
      RAG_MODE: mock
      RAG_SERVICE_URL: ${RAG_SERVICE_URL:-http://host.docker.internal:8000}
      RAG_INTERNAL_TOKEN: ${RAG_INTERNAL_TOKEN:-demo-only-rag-internal-token-change-production}
      RAG_REQUEST_TIMEOUT_MS: ${RAG_REQUEST_TIMEOUT_MS:-10000}
      RAG_QUERY_TIMEOUT_MS: ${RAG_QUERY_TIMEOUT_MS:-60000}
      RAG_CALLBACK_BODY_LIMIT: ${RAG_CALLBACK_BODY_LIMIT:-25mb}
      RAG_HISTORY_MESSAGE_LIMIT: ${RAG_HISTORY_MESSAGE_LIMIT:-20}
      CHAT_PENDING_TIMEOUT_MS: ${CHAT_PENDING_TIMEOUT_MS:-120000}
      RAG_DEFAULT_SUBJECT_ID: ${RAG_DEFAULT_SUBJECT_ID:-mvp-global}
      RAG_SHARED_UPLOAD_DIR: ${RAG_SHARED_UPLOAD_DIR:-/shared/uploads}
      RAG_CALLBACK_URL: ${RAG_CALLBACK_URL:-http://localhost:5001/api/internal/rag/processing-callback}
      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-10000}
      TZ: UTC
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-5001}:5000"
    volumes:
      - uploads_data:/usr/src/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - edurag_network

  qdrant:
    image: qdrant/qdrant:v1.18.2
    restart: unless-stopped
    profiles: ["rag"]
    ports:
      - "127.0.0.1:${QDRANT_HTTP_HOST_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_HOST_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - edurag_network

volumes:
  mysql_data:
  uploads_data:
  qdrant_data:

networks:
  edurag_network:
    driver: bridge
