services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:-edurag}
      MYSQL_USER: ${DB_USER:-edurag_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      TZ: UTC
    ports:
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - edurag_network

  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-edurag}
      DB_USER: ${DB_USER:-edurag_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:?ADMIN_FULL_NAME is required}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      TOKEN_HMAC_PEPPER: ${TOKEN_HMAC_PEPPER:?TOKEN_HMAC_PEPPER is required}
      AUTH_DEV_DELIVERY_LOG_SECRETS: ${AUTH_DEV_DELIVERY_LOG_SECRETS:-false}
      UPLOAD_DIR: /usr/src/app/uploads
      FILE_MAX_SIZE_BYTES: ${FILE_MAX_SIZE_BYTES:-20971520}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL:-http://host.docker.internal:8000}
      RAG_INTERNAL_TOKEN: ${RAG_INTERNAL_TOKEN:?RAG_INTERNAL_TOKEN is required}
      RAG_REQUEST_TIMEOUT_MS: ${RAG_REQUEST_TIMEOUT_MS:-10000}
      TZ: UTC
    ports:
      - "127.0.0.1:${PORT:-5000}:5000"
    volumes:
      - uploads_data:/usr/src/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - edurag_network

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - edurag_network

volumes:
  mysql_data:
  uploads_data:
  qdrant_data:

networks:
  edurag_network:
    driver: bridge
